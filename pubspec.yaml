name: spin_eat
description: "A map-based random food spot recommendation app built with Flutter & Kakao API"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 지도
  kakao_map_plugin: ^0.4.0

  # 위치
  geolocator: ^13.0.2

  # API 호출
  dio: ^5.8.0+1

  # 상태관리
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # URL 실행
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true